<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Raven OG Card</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .og-card {
    width: 1200px;
    height: 630px;
    background: #0a0a12;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 80px;
    overflow: hidden;
  }

  /* Background gradient glow */
  .bg-glow {
    position: absolute;
    top: -120px;
    right: -80px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(0,191,255,0.15) 0%, rgba(0,191,255,0.05) 40%, transparent 70%);
    pointer-events: none;
  }
  .bg-glow-2 {
    position: absolute;
    bottom: -200px;
    left: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,191,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Subtle grid */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Border */
  .og-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 0;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 64px;
    width: 100%;
  }

  .logo-area {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-area img {
    width: 180px;
    height: 180px;
    object-fit: contain;
    filter: drop-shadow(0 0 40px rgba(0,191,255,0.4)) drop-shadow(0 0 80px rgba(0,191,255,0.15));
  }

  .text-area {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .brand {
    font-size: 72px;
    font-weight: 800;
    color: #F0F0F2;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .tagline {
    font-size: 28px;
    font-weight: 500;
    color: #00BFFF;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  .url {
    font-size: 18px;
    font-weight: 500;
    color: rgba(148, 152, 160, 0.8);
    letter-spacing: 0.02em;
    margin-top: 8px;
  }

  .stats {
    display: flex;
    gap: 32px;
    margin-top: 20px;
  }
  .stat {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .stat-num {
    font-size: 24px;
    font-weight: 800;
    color: #00BFFF;
  }
  .stat-label {
    font-size: 14px;
    font-weight: 500;
    color: rgba(148, 152, 160, 0.7);
  }
</style>
</head>
<body>
<div class="og-card">
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>
  <div class="bg-grid"></div>

  <div class="content">
    <div class="logo-area">
      <img src="/assets/raven-logo.png" alt="Raven">
    </div>
    <div class="text-area">
      <div class="brand">Raven</div>
      <div class="tagline">Design Intelligence for AI</div>
      <div class="stats">
        <div class="stat"><span class="stat-num">13</span><span class="stat-label">Tools</span></div>
        <div class="stat"><span class="stat-num">73</span><span class="stat-label">Principles</span></div>
        <div class="stat"><span class="stat-num">12</span><span class="stat-label">Design Systems</span></div>
      </div>
      <div class="url">ravenmcp.ai</div>
    </div>
  </div>
</div>
</body>
</html>
