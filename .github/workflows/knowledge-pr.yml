name: Draft knowledge PRs

on:
  schedule:
    # Mondays 07:00 UTC — weekly drafting window
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      max_issues:
        description: "Max issues to process this run"
        required: false
        default: "5"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "raven-bot"
          git config user.email "raven-bot@users.noreply.github.com"

      - name: Draft PRs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_ISSUES: ${{ inputs.max_issues || '5' }}
        run: node scripts/draft-knowledge-pr.mjs
